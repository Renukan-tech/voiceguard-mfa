<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoiceAuth OTP Verification</title>

    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

<div class="otp-container">

    <div class="otp-card">

        <div class="otp-icon">
            <i class="fa-solid fa-shield-halved"></i>
        </div>

        <h2>OTP Verification</h2>

        <p>Enter the 6-digit OTP generated for your login session.</p>

        <!-- 🔥 SHOW OTP (DEBUG / DEMO) -->
        <div style="margin:10px 0; font-size:14px; color:#444;">
            Demo OTP: <span id="otpDisplay">******</span>
        </div>

        <form id="otpForm">

            <input
                type="text"
                id="otp"
                maxlength="6"
                placeholder="Enter OTP"
                required>

            <button type="submit">Verify OTP</button>

        </form>

        <div class="resend">
            <a href="#" id="resendOTP">Resend OTP</a>
        </div>

    </div>

</div>

<script src="otp.js"></script>

</body>

</html>
